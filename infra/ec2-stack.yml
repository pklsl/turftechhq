AWSTemplateFormatVersion: '2010-09-09'
Description: TurfTechHQ EC2 hosting with Nginx and CodeDeploy

Parameters:
  KeyName:
    Type: String
    Description: EC2 Key Pair name for SSH access
    Default: turftechhq-key
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  SecurityGroupId:
    Type: String
    Description: Security group ID for web server (ports 80, 443)
  CodeDeployServiceRoleArn:
    Type: String
    Description: CodeDeploy service role ARN

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: turftechhq-ec2-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CodeDeployInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${CodeDeployArtifactsBucket}/*'
                  - arn:aws:s3:::aws-codedeploy-us-east-1/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: turftechhq-ec2-instance-profile
      Roles:
        - !Ref EC2InstanceRole

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroupId
      UserData: !Base64
        Fn::Sub: |
          #!/bin/bash
          exec > >(tee /var/log/user-data.log) 2>&1

          export DEBIAN_FRONTEND=noninteractive

          apt-get update -y
          apt-get install -y nginx ruby wget python3-pip awscli

          snap install amazon-ssm-agent --classic || echo "SSM agent snap install failed"
          systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service
          systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true

          systemctl enable nginx
          systemctl start nginx

          mkdir -p /var/www/turftechhq
          chown -R www-data:www-data /var/www/turftechhq

          cat > /etc/nginx/sites-available/turftechhq.conf << 'NGINX'
          server {
              listen 80 default_server;
              server_name turftechhq.com www.turftechhq.com _;

              root /var/www/turftechhq;
              index index.html;

              location /health {
                  access_log off;
                  return 200 'OK';
                  add_header Content-Type text/plain;
              }

              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
              gzip_min_length 256;

              location /_astro/ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }

              location / {
                  try_files $uri $uri/ $uri.html $uri/index.html =404;
                  add_header Cache-Control "public, max-age=60";
              }
          }
          NGINX

          ln -sf /etc/nginx/sites-available/turftechhq.conf /etc/nginx/sites-enabled/turftechhq.conf
          rm -f /etc/nginx/sites-enabled/default

          nginx -t && systemctl reload nginx

          cd /tmp
          wget https://aws-codedeploy-us-east-1.s3.us-east-1.amazonaws.com/latest/install
          chmod +x ./install
          ./install auto
          systemctl enable codedeploy-agent
          systemctl start codedeploy-agent
          sleep 5
          systemctl status codedeploy-agent --no-pager || (echo "Retrying CodeDeploy agent start..." && sleep 10 && systemctl restart codedeploy-agent)
      Tags:
        - Key: Name
          Value: turftechhq-web-server

  CodeDeployArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'turftechhq-codedeploy-artifacts-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: turftechhq
      ComputePlatform: Server

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: turftechhq-production
      ServiceRoleArn: !Ref CodeDeployServiceRoleArn
      Ec2TagFilters:
        - Type: KEY_AND_VALUE
          Key: Name
          Value: turftechhq-web-server
      DeploymentConfigName: CodeDeployDefault.AllAtOnce
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE

  CodePipelineArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'turftechhq-pipeline-artifacts-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: turftechhq-ec2-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                Resource:
                  - !GetAtt CodePipelineArtifactsBucket.Arn
                  - !Sub '${CodePipelineArtifactsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt BuildProject.Arn
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetApplication
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentGroup
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
                Resource:
                  - !Sub 'arn:aws:codedeploy:${AWS::Region}:${AWS::AccountId}:application:${CodeDeployApplication}'
                  - !Sub 'arn:aws:codedeploy:${AWS::Region}:${AWS::AccountId}:deploymentgroup:${CodeDeployApplication}/${CodeDeployDeploymentGroup}'
                  - !Sub 'arn:aws:codedeploy:${AWS::Region}:${AWS::AccountId}:deploymentconfig:CodeDeployDefault.AllAtOnce'

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: turftechhq-ec2-build-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !GetAtt CodePipelineArtifactsBucket.Arn
                  - !Sub '${CodePipelineArtifactsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: turftechhq-ec2-build
      Description: Build TurfTechHQ Astro site for EC2 deployment
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: NODE_VERSION
            Value: '20'
      Artifacts:
        Type: CODEPIPELINE
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 10

  DeployPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: turftechhq-ec2-deploy
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref CodePipelineArtifactsBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: pklsl
                Repo: turftechhq
                Branch: main
                OAuthToken: '{{resolve:secretsmanager:turftechhq/github-token}}'
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: BuildSite
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: DeployToEC2
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApplication
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
              InputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref WebServerInstance
  CodeDeployApplication:
    Description: CodeDeploy application name
    Value: !Ref CodeDeployApplication
  PipelineName:
    Description: CodePipeline name
    Value: !Ref DeployPipeline
